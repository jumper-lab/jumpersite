<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1050" role="img" aria-labelledby="title desc">
  <title id="title">Ritual de skincare do Ateliê Flor</title>
  <desc id="desc">Bancada clara com frascos de skincare, flor, toalha e luz suave.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset="0.46" stop-color="#f5dfda"/>
      <stop offset="1" stop-color="#c88991"/>
    </linearGradient>
    <radialGradient id="light" cx="30%" cy="18%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="0.42" stop-color="#fff4e7" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#fff4e7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8eee3"/>
      <stop offset="0.54" stop-color="#dac3b8"/>
      <stop offset="1" stop-color="#b88c8c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.84"/>
      <stop offset="0.56" stop-color="#dce8da" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#819178" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7ccd2"/>
      <stop offset="1" stop-color="#b75a74"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f1d28" stop-opacity="0"/>
      <stop offset="1" stop-color="#2f1d28" stop-opacity="0.26"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.09"/></feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#6c4050" flood-opacity="0.24"/>
    </filter>
    <filter id="smallShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#6c4050" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1500" height="1050" fill="url(#bg)"/>
  <rect width="1500" height="1050" fill="url(#light)"/>
  <rect width="1500" height="1050" filter="url(#grain)" opacity="0.88"/>
  <path d="M-80 828 C230 720 510 752 770 836 C1050 928 1250 862 1580 676 L1580 1050 L-80 1050 Z" fill="#fffaf4" opacity="0.45"/>
  <path d="M-50 220 C250 170 530 210 795 170 C1034 134 1246 88 1580 160" fill="none" stroke="#fffaf4" stroke-opacity="0.34" stroke-width="2"/>
  <path d="M-70 300 C260 246 540 282 812 242 C1040 210 1288 180 1580 252" fill="none" stroke="#9e6875" stroke-opacity="0.15" stroke-width="2"/>

  <g transform="translate(184 704)" opacity="0.9">
    <ellipse cx="300" cy="64" rx="332" ry="74" fill="#8a5362" opacity="0.13"/>
  </g>

  <g transform="translate(220 612) rotate(-5)" filter="url(#softShadow)">
    <rect width="600" height="250" rx="125" fill="#f9efe5"/>
    <rect x="56" y="52" width="488" height="146" rx="73" fill="none" stroke="#dcc0b8" stroke-width="2"/>
    <path d="M112 122 C208 84 290 166 390 112 C438 86 482 90 524 120" fill="none" stroke="#b75a74" stroke-opacity="0.36" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(600 338)" filter="url(#softShadow)">
    <rect x="0" y="86" width="170" height="378" rx="45" fill="url(#glass)"/>
    <rect x="44" y="22" width="82" height="86" rx="22" fill="#d7bdad"/>
    <rect x="52" y="0" width="66" height="36" rx="18" fill="#bd607b"/>
    <rect x="36" y="204" width="100" height="18" rx="9" fill="#ffffff" opacity="0.52"/>
    <rect x="52" y="238" width="68" height="12" rx="6" fill="#ffffff" opacity="0.36"/>
  </g>

  <g transform="translate(780 434)" filter="url(#smallShadow)">
    <rect width="250" height="190" rx="48" fill="#fff7ed" opacity="0.94"/>
    <rect x="42" y="56" width="138" height="14" rx="7" fill="#bd607b" opacity="0.28"/>
    <rect x="42" y="88" width="166" height="10" rx="5" fill="#6f7d63" opacity="0.18"/>
    <rect x="42" y="112" width="124" height="10" rx="5" fill="#6f7d63" opacity="0.16"/>
    <circle cx="198" cy="142" r="18" fill="#bd607b" opacity="0.2"/>
  </g>

  <g transform="translate(980 320)" filter="url(#softShadow)">
    <rect x="0" y="128" width="176" height="330" rx="58" fill="#e5dcd0"/>
    <rect x="46" y="58" width="84" height="96" rx="26" fill="#f6eee4"/>
    <rect x="56" y="22" width="64" height="46" rx="23" fill="#576d5a"/>
    <rect x="50" y="234" width="76" height="14" rx="7" fill="#fff" opacity="0.5"/>
    <rect x="62" y="266" width="52" height="10" rx="5" fill="#fff" opacity="0.34"/>
  </g>

  <g transform="translate(1038 598)" filter="url(#smallShadow)">
    <circle cx="92" cy="92" r="92" fill="#fff8ef" opacity="0.78"/>
    <circle cx="92" cy="92" r="62" fill="none" stroke="#d1aea8" stroke-width="2"/>
    <ellipse cx="92" cy="94" rx="44" ry="14" fill="#c88991" opacity="0.14"/>
  </g>

  <g transform="translate(312 326)" filter="url(#smallShadow)">
    <path d="M12 300 C84 220 126 138 170 0" fill="none" stroke="#576d5a" stroke-width="8" stroke-linecap="round"/>
    <path d="M170 4 C190 64 168 114 120 144 C112 82 130 34 170 4 Z" fill="#8da083"/>
    <path d="M112 142 C160 154 186 194 178 246 C128 226 104 190 112 142 Z" fill="#778c70"/>
    <g transform="translate(30 240)">
      <ellipse cx="0" cy="0" rx="34" ry="22" fill="url(#rose)" transform="rotate(-20)"/>
      <ellipse cx="46" cy="-2" rx="34" ry="22" fill="#f8c9d2" transform="rotate(18)"/>
      <ellipse cx="24" cy="-30" rx="26" ry="36" fill="#f4b6c2"/>
      <ellipse cx="22" cy="-4" rx="12" ry="10" fill="#d69a6a"/>
    </g>
  </g>

  <g opacity="0.22">
    <circle cx="1240" cy="210" r="94" fill="none" stroke="#fffaf4" stroke-width="2"/>
    <circle cx="1240" cy="210" r="58" fill="none" stroke="#fffaf4" stroke-width="2"/>
    <path d="M1194 210 H1286" stroke="#fffaf4" stroke-width="8" stroke-linecap="round"/>
  </g>

  <rect y="690" width="1500" height="360" fill="url(#shadow)"/>
</svg>
