<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Cena editorial para escritório de advocacia empresarial</title>
  <desc id="desc">Mesa executiva com documentos, caneta e luz lateral em tons sóbrios.</desc>
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1512"/>
      <stop offset="0.42" stop-color="#44221d"/>
      <stop offset="0.74" stop-color="#111820"/>
      <stop offset="1" stop-color="#05080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="18%" r="76%">
      <stop offset="0" stop-color="#f3d3a4" stop-opacity="0.62"/>
      <stop offset="0.28" stop-color="#a95a36" stop-opacity="0.34"/>
      <stop offset="0.7" stop-color="#111820" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.64" stop-color="#e3d2b9"/>
      <stop offset="1" stop-color="#bfae98"/>
    </linearGradient>
    <linearGradient id="paperShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8ec" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#9b7d62" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5524"/>
      <stop offset="0.45" stop-color="#e0b668"/>
      <stop offset="1" stop-color="#8b612d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f1ff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="paperShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1600" height="1100" fill="url(#room)"/>
  <rect width="1600" height="1100" fill="url(#glow)"/>
  <rect width="1600" height="1100" filter="url(#grain)" opacity="0.9"/>

  <path d="M-70 935 C260 760 530 755 862 836 C1100 894 1337 842 1688 682 L1688 1100 L-70 1100 Z" fill="#07090d" opacity="0.74"/>
  <path d="M-38 182 C330 100 702 108 1000 180 C1240 238 1408 222 1660 130" fill="none" stroke="#f6d49b" stroke-opacity="0.11" stroke-width="2"/>
  <path d="M-70 254 C322 168 620 180 930 242 C1210 298 1390 304 1670 238" fill="none" stroke="#fff7e8" stroke-opacity="0.08" stroke-width="2"/>

  <g opacity="0.14">
    <rect x="1020" y="88" width="28" height="218" rx="14" fill="#fff8ec"/>
    <rect x="1082" y="70" width="18" height="260" rx="9" fill="#fff8ec"/>
    <rect x="1136" y="120" width="24" height="188" rx="12" fill="#fff8ec"/>
    <rect x="1200" y="46" width="14" height="290" rx="7" fill="#fff8ec"/>
    <rect x="1260" y="112" width="20" height="210" rx="10" fill="#fff8ec"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="842" y="260" width="506" height="648" rx="22" fill="#171d26"/>
    <rect x="842" y="260" width="506" height="648" rx="22" fill="url(#glass)"/>
    <rect x="878" y="304" width="434" height="54" rx="27" fill="#0b0d11"/>
    <rect x="900" y="394" width="204" height="20" rx="10" fill="#fff8ec" opacity="0.14"/>
    <rect x="900" y="434" width="354" height="14" rx="7" fill="#fff8ec" opacity="0.09"/>
    <rect x="900" y="462" width="314" height="14" rx="7" fill="#fff8ec" opacity="0.07"/>
    <rect x="900" y="490" width="248" height="14" rx="7" fill="#fff8ec" opacity="0.07"/>
  </g>

  <g transform="translate(470 338) rotate(-7)" filter="url(#paperShadow)">
    <rect width="520" height="620" rx="16" fill="url(#paper)"/>
    <rect x="0" y="0" width="520" height="620" rx="16" fill="url(#paperShade)"/>
    <rect x="62" y="78" width="190" height="16" rx="8" fill="#8f4937" opacity="0.32"/>
    <rect x="62" y="130" width="348" height="14" rx="7" fill="#17130f" opacity="0.14"/>
    <rect x="62" y="160" width="390" height="14" rx="7" fill="#17130f" opacity="0.12"/>
    <rect x="62" y="190" width="314" height="14" rx="7" fill="#17130f" opacity="0.1"/>
    <rect x="62" y="258" width="398" height="12" rx="6" fill="#17130f" opacity="0.09"/>
    <rect x="62" y="286" width="366" height="12" rx="6" fill="#17130f" opacity="0.09"/>
    <rect x="62" y="314" width="288" height="12" rx="6" fill="#17130f" opacity="0.08"/>
    <circle cx="404" cy="462" r="58" fill="none" stroke="#944733" stroke-width="5" stroke-opacity="0.42"/>
    <circle cx="404" cy="462" r="40" fill="none" stroke="#944733" stroke-width="3" stroke-opacity="0.32"/>
  </g>

  <g transform="translate(205 558) rotate(5)" filter="url(#paperShadow)">
    <rect width="470" height="330" rx="14" fill="#f4ead8" opacity="0.96"/>
    <rect x="46" y="58" width="180" height="13" rx="7" fill="#b98742" opacity="0.38"/>
    <rect x="46" y="112" width="336" height="13" rx="7" fill="#17130f" opacity="0.14"/>
    <rect x="46" y="142" width="304" height="13" rx="7" fill="#17130f" opacity="0.11"/>
    <rect x="46" y="172" width="224" height="13" rx="7" fill="#17130f" opacity="0.09"/>
    <path d="M50 266 C120 228 160 305 226 258 C268 228 308 226 356 252" fill="none" stroke="#17130f" stroke-opacity="0.28" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(1142 614) rotate(-16)" filter="url(#paperShadow)">
    <rect x="-8" y="-8" width="386" height="54" rx="27" fill="#05080c" opacity="0.26"/>
    <rect width="380" height="24" rx="12" fill="url(#brass)"/>
    <rect x="330" y="-8" width="78" height="40" rx="20" fill="#111820"/>
    <rect x="344" y="2" width="44" height="20" rx="10" fill="#d2af68"/>
  </g>

  <g opacity="0.26">
    <ellipse cx="1270" cy="392" rx="116" ry="116" fill="none" stroke="#fff8ec" stroke-width="2"/>
    <ellipse cx="1270" cy="392" rx="78" ry="78" fill="none" stroke="#fff8ec" stroke-width="1.5"/>
    <rect x="1214" y="386" width="112" height="13" rx="6.5" fill="#fff8ec"/>
  </g>

  <path d="M0 0 H1600 V1100 H0 Z" fill="none" stroke="#fff8ec" stroke-opacity="0.1" stroke-width="2"/>
</svg>
